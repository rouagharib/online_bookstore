<!DOCTYPE html>
<html>
    <head>
        <title> CSS Box Model </title>
        <style>
            body{
                padding: 0;
                margin: 0;
            }
            .box-one{
                background-color: beige;
                height: 100px;
            }
            .box-two{
                background-color: rgb(0, 244, 219);
                height:80px;
                padding:20px;
                width: 100px;
                border: 10px solid blueviolet;
               /* border-radius: 5mm;*/
            }
        </style>
    </head>
    <body>
        <div class="box-one">first </div>
        <div class="box-two">second </div>
    </body>

</html>
